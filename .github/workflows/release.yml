name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            configure: cmake -B build -A x64
          - os: macos-latest
            name: macos
            configure: cmake -B build
          - os: ubuntu-latest
            name: linux
            configure: cmake -B build

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: Configure
        run: ${{ matrix.configure }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package macOS bundle
        if: matrix.name == 'macos'
        run: cd build && zip -r Helix-macos.zip Helix.app

      - name: Upload artifact (Windows)
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: helix-windows
          path: build/Release/Helix.exe

      - name: Upload artifact (macOS)
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: helix-macos
          path: build/Helix-macos.zip

      - name: Upload artifact (Linux)
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: helix-linux
          path: build/Helix

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          mv helix-windows/Helix.exe Helix-windows.exe || true
          mv helix-macos/Helix-macos.zip Helix-macos.zip || true
          mv helix-linux/Helix Helix-linux || true
          chmod +x Helix-linux || true

          gh release view "$tag" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1 && \
            gh release upload "$tag" Helix-* --repo "$GITHUB_REPOSITORY" --clobber || \
            gh release create "$tag" Helix-* --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes
